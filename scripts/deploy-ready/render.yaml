services:
  - type: web
    name: kristo-travel-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn kristo_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PORT
        value: "8000"
      - key: WALLET_ADDRESS
        sync: false
      - key: BASE_RPC_URL
        value: "https://mainnet.base.org"
      - key: PRICE_USDC
        value: "0.25"